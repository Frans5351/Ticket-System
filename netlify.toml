[build]
  publish = "public"
  functions = "functions"
  command = ""

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/api/attachments/file/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
